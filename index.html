<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAN Deep Sea Fishing 🎣🌊</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- DEEP OCEAN BACKGROUND -->
  <div class="deep-sea"></div>
  <div class="light-rays"></div>

  <!-- FLOATING PARTICLES -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>

  <!-- GLOWING CORALS -->
  <div class="coral c1">🪸</div>
  <div class="coral c2">🪸</div>
  <div class="coral c3">🪸</div>

  <!-- DEEP SEA CREATURES -->
  <div class="fish f1">🐠</div>
  <div class="fish f2">🐟</div>
  <div class="fish f3">🦑</div>
  <div class="fish f4">🐡</div>
  <div class="fish f5">🪼</div>

  <!-- MAIN UI -->
  <div class="container">
    <h1>🌊 Deep Sea EAN Fishing 🎣</h1>

    <input type="number" id="qNumber" placeholder="Enter question number (1–20)">
    <button onclick="showQuestion()">Cast into the Deep 🎣</button>

    <div id="questionBox">
      <p id="questionText">🌊 The ocean is calling... drop a number</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
