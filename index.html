<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAN Fishing Zone 🎣</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🌊 EAN Fishing Zone 🎣</h1>

  <div class="input-box">
    <input type="number" id="qNumber" placeholder="Enter question number (1-20)">
    <button onclick="showQuestion()">Fish Question 🎣</button>
  </div>

  <div id="questionBox">
    <p id="questionText">Drop a number to fish your question 🎣</p>
  </div>

  <!-- Floating sea elements -->
  <div class="sea">
    <div class="fish">🐟</div>
    <div class="fish">🐠</div>
    <div class="fish">🐡</div>
    <div class="bubble">🫧</div>
    <div class="bubble">🫧</div>
    <div class="bubble">🫧</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
