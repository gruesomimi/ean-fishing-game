<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAN Fishing Reef 🎣🌊</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- SKY -->
  <div class="sky"></div>
  <div class="sun"></div>

  <!-- CLOUDS -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <!-- OCEAN + WAVE -->
  <div class="ocean"></div>
  <div class="wave"></div>

  <!-- REEF -->
  <div class="reef"></div>

  <!-- FLOATING BUBBLES -->
  <div class="bubble b1">🫧</div>
  <div class="bubble b2">🫧</div>
  <div class="bubble b3">🫧</div>
  <div class="bubble b4">🫧</div>

  <!-- FISH -->
  <div class="fish f1">🐠</div>
  <div class="fish f2">🐟</div>
  <div class="fish f3">🐡</div>
  <div class="fish f4">🐠</div>

  <!-- MAIN GAME UI -->
  <div class="container">
    <h1>🌊 EAN Fishing Reef 🎣</h1>

    <input type="number" id="qNumber" placeholder="Enter question number (1–20)">
    <button onclick="showQuestion()">Cast Fishing Rod 🎣</button>

    <div id="questionBox">
      <p id="questionText">🌊 Drop a number into the reef...</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
