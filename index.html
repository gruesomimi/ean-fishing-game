<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EAN Deep Sea Fishing 🎣🌊</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>
  <div class="light"></div>

  <!-- PARTICLES -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <!-- FISH -->
  <div class="fish f1">🐠</div>
  <div class="fish f2">🐟</div>
  <div class="fish f3">🐡</div>
  <div class="fish f4">🪼</div>

  <!-- CORALS -->
  <div class="coral c1">🪸</div>
  <div class="coral c2">🪸</div>
  <div class="coral c3">🪸</div>

  <!-- UI -->
  <div class="container">

    <h1>🌊 EAN Fishing Reef 🎣</h1>

    <input type="number" id="qNumber" placeholder="Enter question number (1–20)">
    <button onclick="showQuestion()">Cast Fishing Rod 🎣</button>

    <div id="questionBox">
      <p id="questionText">🌊 Cast into the deep sea...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
